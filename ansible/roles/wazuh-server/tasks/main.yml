---
# tasks file for ansible-role-template

# https://documentation.wazuh.com/current/installation-guide/wazuh-server/step-by-step.html

# Step 1: Set max map count for Wazuh
- name: Set max map count for Wazuh
  sysctl:
    name: vm.max_map_count
    value: 262144

# step 2 - Clone the github repository

- name: Clone the Wazuh repository
  ansible.builtin.git:
    repo: https://github.com/wazuh/wazuh-docker.git
    dest: /opt/wazuh-docker
    version: v4.14.6
    force: true
    update: true

- name: Check for the Wazuh certificate generator compose file
  ansible.builtin.stat:
    path: /opt/wazuh-docker/single-node/generate-indexer-certs.yml
  register: wazuh_cert_generator_file

- name: Fail if the generator compose file is missing
  ansible.builtin.fail:
    msg: "The Wazuh certificate generator compose file was not found in the checked-out release."
  when: not wazuh_cert_generator_file.stat.exists

- name: Ensure any stale generator compose project is removed
  community.docker.docker_compose_v2:
    project_src: /opt/wazuh-docker/single-node
    project_name: single-node-generator
    files:
      - generate-indexer-certs.yml
    services:
      - generator
    state: absent
    remove_orphans: true

- name: Generate Wazuh indexer certificates
  community.docker.docker_compose_v2:
    project_src: /opt/wazuh-docker/single-node
    project_name: single-node-generator
    files:
      - generate-indexer-certs.yml
    services:
      - generator
    state: present

- name: Wait for the generated certificate files to exist
  ansible.builtin.wait_for:
    path: /opt/wazuh-docker/single-node/config/wazuh_indexer/certs/admin-key.pem
    state: present
    timeout: 600

# Step 4: Start the Wazuh single-node stack in detached mode
- name: Start the Wazuh single-node stack
  community.docker.docker_compose_v2:
    project_src: /opt/wazuh-docker/single-node
    state: present

